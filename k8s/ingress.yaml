apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ulu-api
  namespace: ulu
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: ulu.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ulu-api
                port:
                  number: 8000
