apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ulu-api
  namespace: ulu
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ulu-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
