apiVersion: v1
kind: Secret
metadata:
  name: ulu-secrets
  namespace: ulu
type: Opaque
stringData:
  # Replace with actual values before applying. Use external-secrets or SealedSecrets in production.
  DATABASE_URL: "postgresql+asyncpg://user:pass@postgres:5432/ulu"
  JWT_SECRET: "change-me-in-production-32byte-secret"
  ALGOD_TOKEN: ""
